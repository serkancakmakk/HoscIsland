name: Build & Release

# Build both apps on every push/PR (CI compiles the code). When the pushed
# commit message contains [release], also publish a GitHub Release with both
# binaries attached.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- macOS app
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build .app (SwiftPM)
        run: ./build.sh

      - name: Zip the .app (preserve bundle/symlinks)
        run: ditto -c -k --keepParent HoscIsland.app HoscIsland-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: HoscIsland-macos.zip

  # ------------------------------------------------------------- Linux binary
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev libwayland-dev \
            meson ninja-build pkg-config \
            gobject-introspection libgirepository1.0-dev

      - name: Build & install gtk4-layer-shell (not packaged on Ubuntu)
        run: |
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git
          cd gtk4-layer-shell
          meson setup -Dexamples=false -Ddocs=false -Dtests=false -Dvapi=false build
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            LinuxIsland/target
          key: cargo-${{ hashFiles('LinuxIsland/Cargo.toml') }}

      - name: Build (release)
        working-directory: LinuxIsland
        env:
          PKG_CONFIG_PATH: /usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig
          LD_LIBRARY_PATH: /usr/local/lib/x86_64-linux-gnu:/usr/local/lib
        run: cargo build --release

      - name: Package binary + assets
        working-directory: LinuxIsland
        run: |
          mkdir -p dist/linux-island
          cp target/release/linux-island dist/linux-island/
          cp -r data dist/linux-island/
          cp README.md dist/linux-island/
          tar -C dist -czf linux-island-linux-x86_64.tar.gz linux-island

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: LinuxIsland/linux-island-linux-x86_64.tar.gz

  # --------------------------------------------------------------- Release
  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    # Only on a push to main whose commit message contains [release].
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from CHANGELOG
        id: ver
        run: |
          V=$(grep -m1 -oE '\[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | tr -d '[]')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-b${{ github.run_number }}
          name: HoscIsland & LinuxIsland v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/macos/HoscIsland-macos.zip
            artifacts/linux/linux-island-linux-x86_64.tar.gz
